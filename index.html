<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AcadPlanner</title>
  <meta name="description" content="AcadPlanner - basic HTML/CSS/JS version" />
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <div class="header"><h1>AcadPlanner</h1></div>
    <div id="notification" class="notification" style="display:none;"></div>

    <div id="authSection" class="card">
      <h2 style="margin:0 0 .75rem; text-align: center;">Login</h2>
      <form id="loginForm" class="grid login-grid">
        <input id="loginEmail" type="email" placeholder="Email" required />
        <input id="loginPassword" type="password" placeholder="Password" required />
        <button type="submit">Sign In</button>
      </form>
      <p class="small">No account? <span id="showRegister" class="link">Create one</span></p>
    </div>

    <div id="registerSection" class="card" style="display:none;">
      <h2 style="margin:0 0 .75rem; text-align: center;">Register</h2>
      <form id="registerForm" class="grid login-grid">
        <input id="registerName" type="text" placeholder="Full name" required />
        <input id="registerEmail" type="email" placeholder="Email" required />
        <input id="registerPassword" type="password" placeholder="Password (min 6 chars)" required />
        <button type="submit">Create account</button>
      </form>
      <p class="small">Already have one? <span id="showLogin" class="link">Sign in</span></p>
    </div>

    <div id="plannerSection" style="display:none;">
      <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
        <div><strong id="userGreeting"></strong></div>
        <button id="logoutBtn" style="width:auto; background:#ef4444;">Logout</button>
      </div>

      <div class="card">
        <h2 style="margin:0 0 .75rem;">Add Event</h2>
        <form id="eventForm" class="grid grid-2">
          <div><input id="title" placeholder="Title" required /></div>
          <div><input type="date" id="date" required /></div>
          <div><input type="time" id="time" /></div>
          <div><select id="type"><option>Class</option><option>Exam</option><option>Assignment</option><option>Lab Work</option><option>Project</option><option>Presentation</option><option>Study</option><option>Administrative</option><option>Other</option></select></div>
          <div><select id="priority"><option>Low</option><option selected>Medium</option><option>High</option></select></div>
          <div></div>
          <button type="submit">Save Event</button>
        </form>
      </div>
      <div class="card">
        <h2 style="margin:0 0 .75rem;">Events</h2>
        <table class="table"><thead><tr><th>Title</th><th>Date</th><th>Time</th><th>Type</th><th>Priority</th><th>Action</th></tr></thead><tbody id="eventList"></tbody></table>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
